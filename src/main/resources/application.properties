# ================== DATOS GENERALES ==================
spring.application.name=dealpro-agencia
server.port=8080

# ================== BASE DE DATOS ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================== BREVO SMTP ==================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}      # Ej: a7123d001@smtp-brevo.com (en Railway)
spring.mail.password=${MAIL_PASS}      # Ej: HdrtOBLzqPnE7GX9 (en Railway)

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true

# Remitente por defecto (puede ser tu Gmail enmascarado por Brevo)
